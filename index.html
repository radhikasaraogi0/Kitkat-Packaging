<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KitKat Packaging</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">

        <div class="top-strip">Have a break, have a KitKat</div>

        <div class="side-ridges left"></div>
        <div class="side-ridges right"></div>

        <div class="logo-area">
            <div class="nestle-badge">Nestlé</div>

            <div class="logo-oval">
                <h1 class="logo-text"><span>K</span>it<span>K</span>at</h1>
            </div>

            <img class="wafer-img" src="choc-removebg-preview.png" alt="wafer">
        </div>
        <div class="veg-logo">
            <div class="green-dot">
                <p>Coated wafer</p>
            </div>
        </div>

        <div class="bottom-strip">Have a break, have a KitKat</div>

    </div>
</body>
</html>
